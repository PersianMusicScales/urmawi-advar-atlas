name: Quality and Lighthouse
on:
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm test
      - name: Start static server
        run: |
          python3 -m http.server 8080 >/tmp/advar-server.log 2>&1 &
          sleep 3
      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://127.0.0.1:8080/?welcome=0
            http://127.0.0.1:8080/?welcome=0&panel=learn
          configPath: ./lighthouserc.json
          uploadArtifacts: true
